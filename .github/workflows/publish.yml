name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore src/SqlCommandBuilder/SqlCommandBuilder.csproj

      - name: Build
        run: dotnet build src/SqlCommandBuilder/SqlCommandBuilder.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test src/SqlCommandBuilder.Test/SqlCommandBuilder.Test.csproj --configuration Release

      - name: Pack
        run: >
          dotnet pack src/SqlCommandBuilder/SqlCommandBuilder.csproj
          --configuration Release
          --no-build
          -p:PackageVersion=${{ steps.version.outputs.value }}

      - name: Login to NuGet (Trusted Publishing)
        uses: NuGet/login@v1
        id: login
        with:
          user: bambangy

      - name: Push to NuGet
        run: >
          dotnet nuget push "dist/SqlCommandBuilder.${{ steps.version.outputs.value }}.nupkg"
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
